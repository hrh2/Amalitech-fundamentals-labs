<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QuickCalc</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="calc" role="application" aria-label="QuickCalc calculator">
    <header class="calc__header">
      <span class="calc__dot" aria-hidden="true"></span>
      <h1 class="calc__title">QuickCalc</h1>
    </header>

    <section class="display" aria-live="polite">
      <div class="display__history" id="historyLine">&nbsp;</div>
      <div class="display__main" id="mainLine">0</div>
    </section>

    <section class="keys" id="keys">
      <button class="key key--fn" data-action="clear">AC</button>
      <button class="key key--fn" data-action="negate">±</button>
      <button class="key key--fn" data-action="percent">%</button>
      <button class="key key--op" data-op="÷">÷</button>

      <button class="key" data-num="7">7</button>
      <button class="key" data-num="8">8</button>
      <button class="key" data-num="9">9</button>
      <button class="key key--op" data-op="×">×</button>

      <button class="key" data-num="4">4</button>
      <button class="key" data-num="5">5</button>
      <button class="key" data-num="6">6</button>
      <button class="key key--op" data-op="−">−</button>

      <button class="key" data-num="1">1</button>
      <button class="key" data-num="2">2</button>
      <button class="key" data-num="3">3</button>
      <button class="key key--op" data-op="+">+</button>

      <button class="key key--wide" data-num="0">0</button>
      <button class="key" data-action="decimal">.</button>
      <button class="key key--equals" data-action="equals">=</button>
    </section>

    <p class="calc__status" id="statusLine">&nbsp;</p>
  </main>

  <script src="script.js"></script>
</body>
</html>
