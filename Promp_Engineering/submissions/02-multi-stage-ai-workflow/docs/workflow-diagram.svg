<svg viewBox="0 0 980 360" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="980" height="360" fill="#f8fafc"/>

  <!-- Title -->
  <text x="490" y="30" text-anchor="middle" font-size="20" font-weight="bold" fill="#0f172a">
    Multi-Stage AI Workflow: Chat (Extractor) -&gt; CLI (Formatter/Integrator)
  </text>

  <!-- Input -->
  <rect x="20" y="90" width="180" height="90" rx="10" fill="#e2e8f0" stroke="#64748b"/>
  <text x="110" y="125" text-anchor="middle" font-size="14" fill="#0f172a">Raw bug report</text>
  <text x="110" y="145" text-anchor="middle" font-size="12" fill="#475569">(unstructured email</text>
  <text x="110" y="160" text-anchor="middle" font-size="12" fill="#475569">from non-technical user)</text>

  <!-- Stage 1 -->
  <rect x="260" y="70" width="220" height="130" rx="10" fill="#dbeafe" stroke="#2563eb"/>
  <text x="370" y="95" text-anchor="middle" font-size="14" font-weight="bold" fill="#1e3a8a">Stage 1 - Chat UX</text>
  <text x="370" y="115" text-anchor="middle" font-size="12" fill="#1e3a8a">Claude.ai / ChatGPT</text>
  <text x="370" y="140" text-anchor="middle" font-size="12" fill="#334155">Extractor prompt:</text>
  <text x="370" y="158" text-anchor="middle" font-size="12" fill="#334155">pulls key fields into</text>
  <text x="370" y="176" text-anchor="middle" font-size="12" fill="#334155">strict JSON schema</text>

  <!-- Handoff artifact -->
  <rect x="540" y="90" width="200" height="90" rx="10" fill="#fef9c3" stroke="#ca8a04"/>
  <text x="640" y="120" text-anchor="middle" font-size="13" font-weight="bold" fill="#713f12">extracted-report.json</text>
  <text x="640" y="140" text-anchor="middle" font-size="12" fill="#713f12">(saved to repo by a human,</text>
  <text x="640" y="157" text-anchor="middle" font-size="12" fill="#713f12">the handoff point)</text>

  <!-- Stage 2 -->
  <rect x="20" y="240" width="220" height="110" rx="10" fill="#dcfce7" stroke="#16a34a"/>
  <text x="130" y="265" text-anchor="middle" font-size="14" font-weight="bold" fill="#14532d">Stage 2 - CLI UX</text>
  <text x="130" y="285" text-anchor="middle" font-size="12" fill="#14532d">ticket-formatter.js</text>
  <text x="130" y="305" text-anchor="middle" font-size="12" fill="#334155">Validates JSON, calls</text>
  <text x="130" y="322" text-anchor="middle" font-size="12" fill="#334155">Claude API (optional),</text>
  <text x="130" y="339" text-anchor="middle" font-size="12" fill="#334155">renders Markdown</text>

  <!-- Output -->
  <rect x="300" y="240" width="220" height="110" rx="10" fill="#ede9fe" stroke="#7c3aed"/>
  <text x="410" y="270" text-anchor="middle" font-size="14" font-weight="bold" fill="#4c1d95">Integrated output</text>
  <text x="410" y="292" text-anchor="middle" font-size="12" fill="#4c1d95">tickets/TF-xxxx.md</text>
  <text x="410" y="310" text-anchor="middle" font-size="12" fill="#4c1d95">tickets/INDEX.md</text>
  <text x="410" y="328" text-anchor="middle" font-size="12" fill="#4c1d95">committed to the repo</text>

  <!-- Optional AI call note -->
  <rect x="580" y="240" width="360" height="110" rx="10" fill="#ffffff" stroke="#94a3b8" stroke-dasharray="4 3"/>
  <text x="760" y="262" text-anchor="middle" font-size="13" font-weight="bold" fill="#334155">Optional: live Claude API call</text>
  <text x="760" y="284" text-anchor="middle" font-size="12" fill="#475569">If ANTHROPIC_API_KEY is set, Stage 2</text>
  <text x="760" y="302" text-anchor="middle" font-size="12" fill="#475569">asks Claude to draft a "suggested first</text>
  <text x="760" y="320" text-anchor="middle" font-size="12" fill="#475569">response" for the on-call engineer.</text>
  <text x="760" y="338" text-anchor="middle" font-size="12" fill="#475569">Falls back to a local template offline.</text>

  <!-- Arrows -->
  <line x1="200" y1="135" x2="255" y2="135" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="480" y1="135" x2="535" y2="135" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="640" y1="180" x2="640" y2="215" stroke="#334155" stroke-width="2"/>
  <line x1="640" y1="215" x2="130" y2="215" stroke="#334155" stroke-width="2"/>
  <line x1="130" y1="215" x2="130" y2="235" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="240" y1="295" x2="295" y2="295" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="130" y1="240" x2="580" y2="200" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="3 3"/>
  <line x1="130" y1="240" x2="700" y2="245" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="3 3" marker-end="url(#arrow)"/>
</svg>
